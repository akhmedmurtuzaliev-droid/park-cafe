<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"
    />
    <meta name="theme-color" content="#0F1115" />
    <title>РИМ КАФЕ — Доставка еды | Махачкала</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@500;600;700;800&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media = 'all'"
    />
    <link
      rel="icon"
      href="https://16a9564f-f8ec-42ba-a998-3027aa809e50.selstorage.ru/rim/45010/images/site/869cc174a49129444428977e56adfd40.PNG"
      type="image/png"
    />
    <style>
      :root {
        --bg: #0f1115;
        --s: #181b21;
        --s2: #1e2128;
        --s3: #252830;
        --s4: #2a2d35;
        --ac: #f4a64a;
        --ah: #f5b366;
        --am: rgba(244, 166, 74, 0.15);
        --t: #fff;
        --t2: #a3a3a3;
        --t3: #6b6b6b;
        --oa: #0f1115;
        --ok: #4caf50;
        --er: #f44336;
        --bd: rgba(255, 255, 255, 0.08);
        --bh: rgba(255, 255, 255, 0.12);
        --sl: 0 8px 32px rgba(0, 0, 0, 0.5);
        --sg: 0 0 20px rgba(244, 166, 74, 0.25);
        --f: "Inter", -apple-system, sans-serif;
        --fd: "Manrope", "SF Pro Display", sans-serif;
        --rs: 8px;
        --rm: 12px;
        --rl: 16px;
        --rxl: 20px;
        --rf: 9999px;
      }
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
      }
      body {
        font-family: var(--f);
        background: var(--bg);
        color: var(--t);
        line-height: 1.5;
        overflow-x: hidden;
      }
      a {
        text-decoration: none;
        color: inherit;
      }
      button {
        font-family: inherit;
        border: none;
        cursor: pointer;
        background: none;
        -webkit-tap-highlight-color: transparent;
      }
      input {
        font-family: inherit;
        border: none;
        outline: none;
        background: none;
      }
      img {
        max-width: 100%;
        height: auto;
        display: block;
      }
      ::-webkit-scrollbar {
        display: none;
      }
      ::selection {
        background: var(--ac);
        color: var(--oa);
      }

      .ct {
        width: 100%;
        max-width: 1440px;
        margin: 0 auto;
        padding: 0 16px;
      }

      /* HEADER */
      .hd {
        padding: 12px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        position: sticky;
        top: 0;
        z-index: 200;
        background: rgba(15, 17, 21, 0.98);
        backdrop-filter: blur(16px);
      }
      .hd-logo {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }
      .hd-logo img {
        width: 48px;
        height: 48px;
        border-radius: 10px;
        object-fit: cover;
      }
      .hd-logo-text {
        font-family: var(--fd);
        font-size: 15px;
        font-weight: 700;
        line-height: 1.1;
      }
      .hd-logo-sub {
        font-size: 9px;
        color: var(--t2);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .hd-addr {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: var(--t2);
        text-align: right;
      }
      .hd-addr svg {
        color: var(--ac);
        flex-shrink: 0;
        width: 14px;
        height: 14px;
      }
      .hd-addr strong {
        color: var(--t);
        font-weight: 500;
        font-size: 12px;
      }
      .hd-menu {
        width: 40px;
        height: 40px;
        background: var(--s2);
        border-radius: var(--rm);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--t2);
      }

      /* SEARCH */
      .srch {
        margin: 0 16px 12px;
        position: relative;
      }
      .srch input {
        width: 100%;
        padding: 12px 50px 12px 44px;
        background: var(--s2);
        border: 1px solid var(--bd);
        border-radius: var(--rm);
        color: var(--t);
        font-size: 14px;
      }
      .srch input::placeholder {
        color: var(--t3);
      }
      .srch input:focus {
        border-color: var(--ac);
      }
      .srch-icon {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--t3);
        pointer-events: none;
      }
      .srch-filter {
        position: absolute;
        right: 6px;
        top: 50%;
        transform: translateY(-50%);
        width: 36px;
        height: 36px;
        background: var(--s3);
        border-radius: var(--rs);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--t2);
        cursor: pointer;
      }

      /* CATEGORY CHIPS */
      .chips {
        display: flex;
        gap: 8px;
        padding: 0 16px;
        overflow-x: auto;
        scrollbar-width: none;
        margin-bottom: 16px;
      }
      .chips::-webkit-scrollbar {
        display: none;
      }
      .chip {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 10px 16px;
        background: var(--s2);
        border: 1px solid var(--bd);
        border-radius: var(--rf);
        font-size: 13px;
        color: var(--t2);
        white-space: nowrap;
        flex-shrink: 0;
      }
      .chip:hover {
        background: var(--s3);
        color: var(--t);
      }
      .chip.on {
        background: var(--am);
        border-color: var(--ac);
        color: var(--ac);
        font-weight: 500;
      }
      .chip-e {
        font-size: 18px;
      }

      /* SECTION */
      .sec {
        padding: 0 16px 20px;
      }
      .sec-h {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
      }
      .sec-t {
        font-family: var(--fd);
        font-size: 22px;
        font-weight: 700;
      }
      .sec-lk {
        display: none;
      }

      /* FEATURED CARD */
      .feat {
        display: flex;
        background: var(--s2);
        border-radius: var(--rxl);
        overflow: hidden;
        gap: 16px;
        padding: 16px;
        align-items: center;
        margin-bottom: 20px;
      }
      .feat-img {
        width: 160px;
        height: 120px;
        border-radius: var(--rm);
        overflow: hidden;
        flex-shrink: 0;
        background: var(--s3);
      }
      .feat-img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .feat-info {
        flex: 1;
        min-width: 0;
      }
      .feat-name {
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 4px;
      }
      .feat-desc {
        font-size: 12px;
        color: var(--t2);
        margin-bottom: 10px;
        line-height: 1.4;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .feat-bottom {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .feat-price {
        font-size: 20px;
        font-weight: 700;
        color: var(--ac);
      }
      .feat-weight {
        font-size: 12px;
        color: var(--t3);
      }
      .feat-add {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 10px 16px;
        background: var(--ac);
        color: var(--oa);
        font-size: 13px;
        font-weight: 600;
        border-radius: var(--rm);
        white-space: nowrap;
      }
      .feat-add:hover {
        background: var(--ah);
      }
      .feat-add svg {
        width: 16px;
        height: 16px;
      }

      /* PRODUCT CARDS - HORIZONTAL SCROLL */
      .p-scroll {
        display: flex;
        gap: 12px;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        padding-bottom: 4px;
      }
      .p-scroll::-webkit-scrollbar {
        display: none;
      }
      .p-card {
        min-width: 200px;
        max-width: 200px;
        background: var(--s2);
        border-radius: var(--rl);
        overflow: hidden;
        scroll-snap-align: start;
        flex-shrink: 0;
        cursor: pointer;
        transition: transform 0.2s;
      }
      .p-card:hover {
        transform: translateY(-2px);
      }
      .p-img {
        position: relative;
        aspect-ratio: 1;
        background: var(--s3);
      }
      .p-img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .p-heart {
        position: absolute;
        top: 8px;
        right: 8px;
        width: 28px;
        height: 28px;
        background: rgba(15, 17, 21, 0.6);
        backdrop-filter: blur(8px);
        border-radius: var(--rf);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--t2);
      }
      .p-heart.on {
        color: var(--er);
      }
      .p-heart svg {
        width: 14px;
        height: 14px;
      }
      .p-info {
        padding: 10px;
      }
      .p-name {
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 3px;
        display: -webkit-box;
        -webkit-line-clamp: 1;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .p-desc {
        font-size: 11px;
        color: var(--t3);
        margin-bottom: 8px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        line-height: 1.3;
      }
      .p-foot {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .p-price {
        font-size: 15px;
        font-weight: 700;
      }
      .p-plus {
        width: 30px;
        height: 30px;
        background: var(--ac);
        border-radius: var(--rf);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--oa);
      }
      .p-plus svg {
        width: 16px;
        height: 16px;
      }

      /* PROMO BANNER */
      .promo {
        margin: 0 16px 20px;
        padding: 20px;
        background: linear-gradient(135deg, var(--s2), var(--s));
        border-radius: var(--rxl);
        display: flex;
        align-items: center;
        gap: 16px;
        overflow: hidden;
      }
      .promo-txt {
        flex: 1;
      }
      .promo-title {
        font-family: var(--fd);
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 4px;
      }
      .promo-sub {
        font-size: 12px;
        color: var(--t2);
      }
      .promo-badge {
        display: inline-block;
        padding: 4px 10px;
        background: var(--ac);
        color: var(--oa);
        font-size: 11px;
        font-weight: 700;
        border-radius: var(--rs);
        margin-top: 8px;
      }
      .promo-img {
        width: 100px;
        height: 80px;
        border-radius: var(--rm);
        overflow: hidden;
        flex-shrink: 0;
      }
      .promo-img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* BOTTOM NAV */
      .bn {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 300;
        background: rgba(15, 17, 21, 0.98);
        backdrop-filter: blur(16px);
        border-top: 1px solid var(--bd);
        padding: 6px 0;
        padding-bottom: max(6px, env(safe-area-inset-bottom));
      }
      .bn-in {
        display: flex;
        align-items: center;
        justify-content: space-around;
      }
      .bni {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        padding: 4px 8px;
        color: var(--t3);
        font-size: 10px;
        font-weight: 500;
        position: relative;
        min-width: 56px;
      }
      .bni.on {
        color: var(--ac);
      }
      .bni svg {
        width: 22px;
        height: 22px;
      }
      .bni .bdg {
        position: absolute;
        top: -2px;
        right: 8px;
        min-width: 16px;
        height: 16px;
        padding: 0 4px;
        background: var(--ac);
        color: var(--oa);
        font-size: 9px;
        font-weight: 700;
        border-radius: var(--rf);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      body {
        padding-bottom: 70px;
      }

      /* MODAL */
      .mov {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        z-index: 400;
        display: none;
        align-items: flex-end;
        justify-content: center;
      }
      .mov.on {
        display: flex;
      }
      .modal {
        width: 100%;
        max-width: 500px;
        max-height: 85vh;
        background: var(--s);
        border-radius: 20px 20px 0 0;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .modal-img {
        width: 100%;
        aspect-ratio: 4/3;
        background: var(--s3);
        overflow: hidden;
        position: relative;
      }
      .modal-img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .modal-close {
        position: absolute;
        top: 12px;
        right: 12px;
        width: 32px;
        height: 32px;
        background: rgba(15, 17, 21, 0.7);
        backdrop-filter: blur(8px);
        border-radius: var(--rf);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--t2);
        z-index: 2;
      }
      .modal-body {
        padding: 20px;
        overflow-y: auto;
        flex: 1;
      }
      .modal-name {
        font-family: var(--fd);
        font-size: 22px;
        font-weight: 700;
        margin-bottom: 6px;
      }
      .modal-desc {
        font-size: 13px;
        color: var(--t2);
        line-height: 1.5;
        margin-bottom: 16px;
      }
      .modal-meta {
        display: flex;
        gap: 16px;
        margin-bottom: 20px;
      }
      .modal-meta span {
        font-size: 13px;
        color: var(--t3);
      }
      .modal-meta strong {
        color: var(--t);
      }
      .modal-add {
        width: 100%;
        padding: 14px;
        background: var(--ac);
        color: var(--oa);
        font-size: 15px;
        font-weight: 700;
        border-radius: var(--rm);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .modal-add:hover {
        background: var(--ah);
        box-shadow: var(--sg);
      }

      /* SHOW ALL */
      .soov {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        z-index: 400;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }
      .soov.on {
        display: flex;
      }
      .so {
        width: 100%;
        max-width: 1200px;
        max-height: 90vh;
        background: var(--s);
        border-radius: var(--rxl);
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .soh {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px;
        border-bottom: 1px solid var(--bd);
      }
      .sot {
        font-family: var(--fd);
        font-size: 18px;
        font-weight: 700;
      }
      .soc {
        width: 32px;
        height: 32px;
        background: var(--s2);
        border-radius: var(--rf);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--t2);
      }
      .soc:hover {
        background: var(--s3);
        color: var(--t);
      }
      .sob {
        padding: 16px;
        overflow-y: auto;
        flex: 1;
      }
      .sog {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }
      .socat {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }
      .soch {
        padding: 6px 12px;
        background: var(--s2);
        border: 1px solid var(--bd);
        border-radius: var(--rf);
        font-size: 11px;
        color: var(--t2);
        cursor: pointer;
      }
      .soch:hover {
        background: var(--s3);
        color: var(--t);
      }
      .soch.on {
        background: var(--ac);
        border-color: var(--ac);
        color: var(--oa);
      }
      .socn {
        font-size: 12px;
        color: var(--t3);
        margin-bottom: 10px;
      }

      /* TOAST */
      .toast {
        position: fixed;
        bottom: 90px;
        left: 50%;
        transform: translateX(-50%);
        padding: 10px 20px;
        background: var(--s3);
        border: 1px solid var(--bd);
        border-radius: var(--rf);
        color: var(--t);
        font-size: 13px;
        font-weight: 500;
        z-index: 500;
        box-shadow: var(--sl);
        display: flex;
        align-items: center;
        gap: 8px;
        opacity: 0;
        visibility: hidden;
        transition: 0.25s;
        white-space: nowrap;
      }
      .toast.on {
        opacity: 1;
        visibility: visible;
      }

      /* RESPONSIVE */
      @media (min-width: 768px) {
        .p-scroll {
          flex-wrap: wrap;
          overflow-x: visible;
        }
        .p-card {
          min-width: calc(33.333% - 8px);
          max-width: calc(33.333% - 8px);
        }
        .feat {
          padding: 24px;
        }
        .feat-img {
          width: 200px;
          height: 150px;
        }
        .sog {
          grid-template-columns: repeat(3, 1fr);
        }
      }
      @media (min-width: 1024px) {
        .p-card {
          min-width: calc(25% - 9px);
          max-width: calc(25% - 9px);
        }
        .feat-img {
          width: 240px;
          height: 180px;
        }
        .sog {
          grid-template-columns: repeat(4, 1fr);
        }
        .ct {
          max-width: 1200px;
        }
      }
      @media (min-width: 1440px) {
        .ct {
          max-width: 1400px;
        }
        .p-card {
          min-width: calc(20% - 10px);
          max-width: calc(20% - 10px);
        }
      }
    </style>
  </head>
  <body>
    <header class="hd">
      <div class="hd-logo">
        <img
          src="https://16a9564f-f8ec-42ba-a998-3027aa809e50.selstorage.ru/rim/45010/images/site/d01366add6feee4354f98de9e88bdbf3.PNG"
          alt="Рим Кафе"
          width="48"
          height="48"
          loading="eager"
          decoding="async"
        />
        <div>
          <div class="hd-logo-text">РИМ КАФЕ</div>
          <div class="hd-logo-sub">Park Cafe</div>
        </div>
      </div>
      <div class="hd-addr">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
          <circle cx="12" cy="10" r="3"></circle>
        </svg>
        <div><strong>Аскерханова 16,</strong><br />Махачкала</div>
      </div>
      <button class="hd-menu" onclick="openMenu()">
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
    </header>

    <div class="srch">
      <svg
        class="srch-icon"
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <circle cx="11" cy="11" r="8"></circle>
        <path d="M21 21l-4.35-4.35"></path>
      </svg>
      <input
        type="text"
        placeholder="Поиск блюд"
        id="si"
        autocomplete="off"
        spellcheck="false"
      />
      <div class="srch-filter">
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <line x1="4" y1="21" x2="4" y2="14"></line>
          <line x1="4" y1="10" x2="4" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="12"></line>
          <line x1="12" y1="8" x2="12" y2="3"></line>
          <line x1="20" y1="21" x2="20" y2="16"></line>
          <line x1="20" y1="12" x2="20" y2="3"></line>
          <line x1="1" y1="14" x2="7" y2="14"></line>
          <line x1="9" y1="8" x2="15" y2="8"></line>
          <line x1="17" y1="16" x2="23" y2="16"></line>
        </svg>
      </div>
    </div>

          img: IB + "items/9b0266159bc66a501b2586a9adf7997f.JPEG",
          b: [],
        },
        {
          n: "Ореховый соус",
          p: 50,
          w: "25 мл",
          cat: "sauces",
          d: "Ореховый соус",
          img: IB + "items/c5c3f357ab2f505fc99e337c3fc1ef2d.JPEG",
          b: [],
        },
        {
          n: "Сырный соус",
          p: 30,
          w: "25 мл",
          cat: "sauces",
          d: "Сырный соус",
          img: IB + "items/ae6e1866db378773ebb5a87a269ffcf5.JPEG",
          b: [],
        },
        {
          n: "Унаги соус",
          p: 30,
          w: "25 мл",
          cat: "sauces",
          d: "Унаги соус",
          img: IB + "items/eae0951fce83c60e5362840266a4c769.JPEG",
          b: [],
        },
      ];

      const CAT_COUNTS = {};
      P.forEach((p) => {
        CAT_COUNTS[p.cat] = (CAT_COUNTS[p.cat] || 0) + 1;
      });

      class App {
        constructor() {
          this.cart = [];
          this.fav = new Set();
          this.curCat = "all";
          this.soCat = "all";
          this.init();
        }
        init() {
          this.renderChips();
          this.renderMain();
          this.bind();
        }
        bind() {
          document
            .getElementById("si")
            ?.addEventListener("input", (e) => this.search(e.target.value));
          document
            .getElementById("mcl")
            ?.addEventListener("click", () => this.closeM());
          document.getElementById("pMod")?.addEventListener("click", (e) => {
            if (e.target.classList.contains("mov")) this.closeM();
          });
          document
            .getElementById("soCl")
            ?.addEventListener("click", () => closeSA());
          document.getElementById("soMod")?.addEventListener("click", (e) => {
            if (e.target.classList.contains("soov")) closeSA();
          });
          document.getElementById("menuMod")?.addEventListener("click", (e) => {
            if (e.target.classList.contains("mov")) closeMenu();
          });
          document.getElementById("cartMod")?.addEventListener("click", (e) => {
            if (e.target.classList.contains("mov")) closeCart();
          });
        }
        renderChips() {
          const el = document.getElementById("chips");
          if (!el) return;
          el.innerHTML = CATS.map(
            (c) =>
              `<button class="chip${c.id === this.curCat ? " on" : ""}" data-cat="${c.id}"><span class="chip-e">${c.e}</span> ${c.n}</button>`,
          ).join("");
          el.querySelectorAll(".chip").forEach((b) =>
            b.addEventListener("click", () => {
              this.curCat = b.dataset.cat;
              this.renderChips();
              this.renderMain();
            }),
          );
        }
        renderMain() {
          const mc = document.getElementById("mainContent");
          if (!mc) return;
          const catsToShow =
            this.curCat === "all"
              ? CATS.filter((c) => c.id !== "all" && CAT_COUNTS[c.id])
              : CATS.filter((c) => c.id === this.curCat);
          let html = "";
          catsToShow.forEach((cat) => {
            const items = P.filter((p) => p.cat === cat.id);
            if (!items.length) return;
            const feat = items.find((p) => p.feat);
            const rest = items.filter((p) => p !== feat);
            html += `<section class="sec"><div class="sec-h"><h2 class="sec-t">${cat.e} ${cat.n}</h2></div>`;
            if (feat) {
              html += `<div class="feat"><div class="feat-img"><img src="${im(feat.img)}" alt="${feat.n}" loading="lazy" decoding="async"></div><div class="feat-info"><h3 class="feat-name">${feat.n}</h3><p class="feat-desc">${feat.d}</p><div class="feat-bottom"><div><div class="feat-price">${feat.p} ₽</div><div class="feat-weight">${feat.w}</div></div><button class="feat-add" onclick="app.addCart('${feat.n.replace(/'/g, "\\'")}')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"></path></svg> В корзину</button></div></div></div>`;
            }
            if (rest.length) {
              html += `<div class="p-scroll">${rest.map((p) => this.card(p)).join("")}</div>`;
            }
            html += `</section>`;
          });
          if (!html && this.curCat !== "all") {
            const items = P.filter((p) => p.cat === this.curCat);
            html = `<section class="sec"><div class="sec-h"><h2 class="sec-t">${CATS.find((c) => c.id === this.curCat)?.e || ""} ${CATS.find((c) => c.id === this.curCat)?.n || ""}</h2></div><div class="p-scroll">${items.map((p) => this.card(p)).join("")}</div></section>`;
          }
          if (!html && this.curCat === "all") {
            html = `<section class="sec"><div class="sec-h"><h2 class="sec-t">Меню</h2></div><div class="p-scroll">${P.slice(
              0,
              20,
            )
              .map((p) => this.card(p))
              .join("")}</div></section>`;
          }
          mc.innerHTML = html;
          mc.querySelectorAll(".p-card").forEach((card) =>
            card.addEventListener("click", (e) => {
              if (!e.target.closest(".p-plus") && !e.target.closest(".p-heart"))
                this.openM(decodeURIComponent(card.dataset.n));
            }),
          );
          mc.querySelectorAll(".p-plus").forEach((b) =>
            b.addEventListener("click", (e) => {
              e.stopPropagation();
              this.addCart(decodeURIComponent(b.dataset.n));
            }),
          );
          mc.querySelectorAll(".p-heart").forEach((b) =>
            b.addEventListener("click", (e) => {
              e.stopPropagation();
              this.togFav(decodeURIComponent(b.dataset.n), b);
            }),
          );
        }
        card(p) {
          return `<div class="p-card" data-n="${encodeURIComponent(p.n)}"><div class="p-img"><img src="${im(p.img)}" alt="${p.n}" loading="lazy" decoding="async" width="200" height="200"><button class="p-heart${this.fav.has(p.n) ? " on" : ""}" data-n="${encodeURIComponent(p.n)}"><svg viewBox="0 0 24 24" fill="${this.fav.has(p.n) ? "currentColor" : "none"}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg></button></div><div class="p-info"><h3 class="p-name">${p.n}</h3><p class="p-desc">${p.d}</p><div class="p-foot"><div class="p-price">${p.p} ₽</div><button class="p-plus" data-n="${encodeURIComponent(p.n)}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"></path></svg></button></div></div></div>`;
        }
        addCart(name) {
          const p = P.find((x) => x.n === name);
          if (!p) return;
          const it = this.cart.find((x) => x.n === name);
          if (it) it.q++;
          else this.cart.push({ ...p, q: 1 });
          this.updCart();
          this.toast(p.n + " добавлен");
        }
        updQ(name, d) {
          const it = this.cart.find((x) => x.n === name);
          if (!it) return;
          it.q += d;
          if (it.q <= 0) this.cart = this.cart.filter((x) => x.n !== name);
          this.updCart();
        }
        updCart() {
          const t = this.cart.reduce((s, i) => s + i.q, 0);
          const bdg = document.getElementById("bnBdg");
          if (bdg) {
            bdg.textContent = t;
            if (t > 0) bdg.style.display = "flex";
            else bdg.style.display = "none";
          }
        }
        openM(name) {
          const p = P.find((x) => x.n === name);
          if (!p) return;
          document.getElementById("mImg").src =
            p.img + "?w=600&h=400&fit=crop&auto=format&q=70";
          document.getElementById("mName").textContent = p.n;
          document.getElementById("mDesc").textContent =
            p.d || "Состав уточняйте у оператора";
          document.getElementById("mWeight").textContent = p.w;
          document.getElementById("mPrice").textContent = p.p + " ₽";
          document.getElementById("mAdd").onclick = () => {
            this.addCart(name);
            this.closeM();
          };
          document.getElementById("pMod").classList.add("on");
          document.body.style.overflow = "hidden";
        }
        closeM() {
          document.getElementById("pMod").classList.remove("on");
          document.body.style.overflow = "";
        }
        toast(msg) {
          const t = document.getElementById("toast");
          document.getElementById("tMsg").textContent = msg;
          t.classList.add("on");
          clearTimeout(this._tt);
          this._tt = setTimeout(() => t.classList.remove("on"), 2000);
        }
        togFav(name, btn) {
          if (this.fav.has(name)) {
            this.fav.delete(name);
            btn.classList.remove("on");
            btn.querySelector("svg").setAttribute("fill", "none");
            this.toast("Удалено из избранного");
          } else {
            this.fav.add(name);
            btn.classList.add("on");
            btn.querySelector("svg").setAttribute("fill", "currentColor");
            this.toast("В избранное");
          }
        }
      }

      function openSA(cat) {
        app.soCat = cat || "all";
        const m = document.getElementById("soMod");
        const catInfo = CATS.find((c) => c.id === cat);
        document.getElementById("soTt").textContent = catInfo
          ? catInfo.e + " " + catInfo.n
          : "Все блюда";
        document.getElementById("soCats").innerHTML = CATS.map(
          (c) =>
            '<button class="soch' +
            (app.soCat === c.id ? " on" : "") +
            '" data-cat="' +
            c.id +
            '">' +
            c.e +
            " " +
            c.n +
            "</button>",
        ).join("");
        document.querySelectorAll(".soch").forEach((b) =>
          b.addEventListener("click", () => {
            app.soCat = b.dataset.cat;
            renderSA();
          }),
        );
        renderSA();
        m.classList.add("on");
        document.body.style.overflow = "hidden";
      }
      function renderSA() {
        let items =
          app.soCat === "all" ? P : P.filter((p) => p.cat === app.soCat);
        document.getElementById("soCnt").textContent =
          "Найдено: " + items.length + " блюд";
        document
          .querySelectorAll(".soch")
          .forEach((c) =>
            c.classList.toggle("on", c.dataset.cat === app.soCat),
          );
        const g = document.getElementById("soG");
        g.innerHTML = items
          .map(
            (p) =>
              `<div class="p-card" data-n="${encodeURIComponent(p.n)}"><div class="p-img"><img src="${im(p.img)}" alt="${p.n}" loading="lazy" decoding="async" width="200" height="200"><button class="p-heart${app.fav.has(p.n) ? " on" : ""}" data-n="${encodeURIComponent(p.n)}"><svg viewBox="0 0 24 24" fill="${app.fav.has(p.n) ? "currentColor" : "none"}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg></button></div><div class="p-info"><h3 class="p-name">${p.n}</h3><p class="p-desc">${p.d}</p><div class="p-foot"><div class="p-price">${p.p} ₽</div><button class="p-plus" data-n="${encodeURIComponent(p.n)}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"></path></svg></button></div></div></div>`,
          )
          .join("");
        g.querySelectorAll(".p-card").forEach((card) =>
          card.addEventListener("click", (e) => {
            if (!e.target.closest(".p-plus") && !e.target.closest(".p-heart"))
              app.openM(decodeURIComponent(card.dataset.n));
          }),
        );
        g.querySelectorAll(".p-plus").forEach((b) =>
          b.addEventListener("click", (e) => {
            e.stopPropagation();
            app.addCart(decodeURIComponent(b.dataset.n));
          }),
        );
        g.querySelectorAll(".p-heart").forEach((b) =>
          b.addEventListener("click", (e) => {
            e.stopPropagation();
            app.togFav(decodeURIComponent(b.dataset.n), b);
          }),
        );
      }
      function closeSA() {
        document.getElementById("soMod").classList.remove("on");
        document.body.style.overflow = "";
      }
      function showFav() {
        app.curCat = "all";
        app.renderChips();
        const mc = document.getElementById("mainContent");
        const f = P.filter((p) => app.fav.has(p.n));
        mc.innerHTML = `<section class="sec"><div class="sec-h"><h2 class="sec-t">❤️ Избранное</h2><span class="sec-lk" onclick="app.curCat='all';app.renderChips();app.renderMain()">← Назад</span></div>${f.length ? '<div class="p-scroll">' + f.map((p) => app.card(p)).join("") + "</div>" : '<p style="color:var(--t3);text-align:center;padding:40px 0">Нет избранных блюд</p>'}</section>`;
        mc.querySelectorAll(".p-card").forEach((card) =>
          card.addEventListener("click", (e) => {
            if (!e.target.closest(".p-plus") && !e.target.closest(".p-heart"))
              app.openM(decodeURIComponent(card.dataset.n));
          }),
        );
        mc.querySelectorAll(".p-plus").forEach((b) =>
          b.addEventListener("click", (e) => {
            e.stopPropagation();
            app.addCart(decodeURIComponent(b.dataset.n));
          }),
        );
        mc.querySelectorAll(".p-heart").forEach((b) =>
          b.addEventListener("click", (e) => {
            e.stopPropagation();
            app.togFav(decodeURIComponent(b.dataset.n), b);
          }),
        );
      }
      function scrollCart() {
        showCart();
      }
      function openMenu() {
        document.getElementById("menuMod").classList.add("on");
        document.body.style.overflow = "hidden";
      }
      function closeMenu() {
        document.getElementById("menuMod").classList.remove("on");
        document.body.style.overflow = "";
      }
      function showCart() {
        const m = document.getElementById("cartMod");
        const items = document.getElementById("cartItems");
        const cart = app.cart;
        if (!cart.length) {
          items.innerHTML =
            '<div style="text-align:center;padding:40px 0;color:var(--t3)">🛒 Корзина пуста</div>';
        } else {
          const total = cart.reduce((s, i) => s + i.p * i.q, 0);
          items.innerHTML = cart
            .map(
              (
                i,
              ) => `<div style="display:flex;gap:12px;padding:12px;background:var(--s2);border-radius:12px;margin-bottom:8px;align-items:center">
<img src="${im100(i.img)}" style="width:56px;height:56px;border-radius:8px;object-fit:cover;flex-shrink:0" loading="lazy" decoding="async">
<div style="flex:1;min-width:0">
<div style="font-size:13px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${i.n}</div>
<div style="font-size:12px;color:var(--t3)">${i.w}</div>
</div>
<div style="display:flex;align-items:center;gap:8px">
<button onclick="app.updQ('${i.n.replace(/'/g, "\\'")}',-1);showCart()" style="width:28px;height:28px;background:var(--s3);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--t2)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"></path></svg></button>
<span style="font-size:14px;font-weight:600;min-width:20px;text-align:center">${i.q}</span>
<button onclick="app.updQ('${i.n.replace(/'/g, "\\'")}',1);showCart()" style="width:28px;height:28px;background:var(--s3);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--t2)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"></path></svg></button>
<div style="font-size:14px;font-weight:700;color:var(--ac);min-width:60px;text-align:right">${i.p * i.q} ₽</div>
</div>
</div>`,
            )
            .join("");
          items.innerHTML += `<div style="border-top:1px solid var(--bd);padding-top:16px;margin-top:8px">
<div style="display:flex;justify-content:space-between;font-size:13px;color:var(--t2);margin-bottom:6px"><span>Доставка</span><span style="color:var(--ok)">Бесплатно</span></div>
<div style="display:flex;justify-content:space-between;font-size:18px;font-weight:700;margin-bottom:16px"><span>Итого</span><span>${total} ₽</span></div>
<a href="tel:89285522363" style="display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;background:var(--ac);color:var(--oa);font-size:15px;font-weight:700;border-radius:12px;text-decoration:none">📞 Позвонить для заказа</a>
<div style="text-align:center;margin-top:12px;font-size:12px;color:var(--t3)">8 (928) 552-23-63</div>
</div>`;
        }
        m.classList.add("on");
        document.body.style.overflow = "hidden";
      }
      function closeCart() {
        document.getElementById("cartMod").classList.remove("on");
        document.body.style.overflow = "";
      }
      document.addEventListener("DOMContentLoaded", () => {
        window.app = new App();
      });
    </script>
  </body>
</html>
